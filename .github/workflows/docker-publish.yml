name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./scm__backend_v2
          file: ./scm__backend_v2/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pracindo-backend:latest

      - name: Generate Frontend Environment File
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > ./supply_chain_management/.env.production

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./supply_chain_management
          file: ./supply_chain_management/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pracindo-frontend:latest